spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/spiceflow
    username: spiceflow_user
    password: spiceflow_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    com.spiceflow: DEBUG
    org.hibernate.SQL: DEBUG