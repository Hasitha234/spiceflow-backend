spring:
  application:
    name: spiceflow-backend

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.spiceflow: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 28800000
    refresh-token-expiry: 604800000
