spring:
  datasource:
    url: jdbc:h2:mem:spiceflow_test;DB_CLOSE_DELAY=-1
    username: sa
    password: password
    driverClassName: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
  thymeleaf:
    check-template-location: false
  flyway:
    enabled: false
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

app:
  jwt:
    secret: testOnlySecretKeyMustBeAtLeast256BitsLongForHmacSha256Algorithm!
    access-token-expiry: 28800000
    refresh-token-expiry: 604800000
