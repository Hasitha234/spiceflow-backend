name: Backend CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # speeds up builds by caching dependencies
          
      - name: Ensure wrapper is executable
        run: chmod +x ./mvnw

      - name: Build and test
      # Runs compilation and unit tests.
      # Later we will add Checkstyle here (mvn checkstyle:check)
        run: ./mvnw clean verify